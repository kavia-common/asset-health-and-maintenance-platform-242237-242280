[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_ignores = True
warn_redundant_casts = True
strict_optional = True

# Repo layout: sources live under ./src and are imported as `api.*`
explicit_package_bases = True
mypy_path = src

# This repo is not fully typed; keep mypy usable for CI/static analysis.
ignore_missing_imports = True
